name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-test:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install deps
        run: npm ci

      - name: Unit Tests
        run: npm run test:unit

      - name: Upload coverage
        if: success()
        run: |
          if [ -d coverage ]; then
            echo "Uploading coverage artifact";
            tar -czf coverage.tgz coverage;
          else
            echo "No coverage directory present";
          fi
        shell: bash
      - name: Publish coverage artifact
        if: success() && hashFiles('coverage.tgz') != ''
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.tgz
      - name: Show coverage summary
        if: success()
        run: |
          if [ -f coverage/coverage-summary.json ]; then
            echo "Coverage summary:" && cat coverage/coverage-summary.json; else echo "No coverage summary"; fi
        shell: bash

      - name: Lint
        run: npm run lint --max-warnings=0

      - name: Typecheck
        run: npm run typecheck

      - name: Build Proxy
        run: npm run build:server
        env:
          GEMINI_API_KEY: dummy
          API_KEY: dummy

      - name: Proxy Health (local)
        run: |
          node dist-server/server/proxy.js &
          PID=$!
          sleep 2
          curl -f http://localhost:8787/api/health || (echo "Health check failed" && kill $PID && exit 1)
          kill $PID
        env:
          GEMINI_API_KEY: dummy

      - name: Build Web
        run: npm run build
        env:
          GEMINI_API_KEY: dummy
          API_KEY: dummy

      - name: Playwright Browsers
        run: npx playwright install --with-deps

      - name: E2E Tests
        run: npm run test:e2e
        env:
          GEMINI_API_KEY: dummy
          API_KEY: dummy

  electron-build:
    runs-on: ubuntu-latest
    needs: build-test
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - run: npm run build:renderer
        env:
          GEMINI_API_KEY: dummy
          API_KEY: dummy
      - name: Archive renderer dist
        uses: actions/upload-artifact@v4
        with:
          name: web-dist
          path: dist/

  android-assemble:
    runs-on: ubuntu-latest
    needs: build-test
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - name: Install deps
        run: npm ci
      - name: Build web assets
        run: npm run build
        env:
          GEMINI_API_KEY: dummy
          API_KEY: dummy
      - name: Sync Capacitor (skip add since android already present)
        run: npx cap sync android
      - name: Setup JDK
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          cache: 'gradle'
      - name: Gradle assembleDebug
        working-directory: android
        run: ./gradlew assembleDebug --no-daemon
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
        if: success()

  release-on-tag:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [build-test]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - run: npm run build
        env:
          GEMINI_API_KEY: dummy
          API_KEY: dummy
      - name: Package Electron (Linux build only for CI smoke)
        run: |
          echo "Skipping Windows NSIS packaging on Linux runner"
      - name: Create Release Draft
        uses: softprops/action-gh-release@v2
        with:
          draft: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
